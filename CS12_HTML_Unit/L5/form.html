<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Part Order Form</h1>
    <form action="/submit" method="post">
      <table>
        <tr>
          <td><label for="name">Full Name</label></td>
          <td>
            <input name="name" id="name" type="text" placeholder="John Doe" />
          </td>
        </tr>
        <tr>
          <td><label for="email">Email</label></td>
          <td>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="abc@gmail.com"
            />
          </td>
        </tr>

        <tr>
          <td>
            <label for="radio">Grade</label>
          </td>
          <td>
            <input type="radio" name="grade" id="g10" />
            <input type="radio" name="grade" id="g11" />
            <input type="radio" name="grade" id="g12" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
